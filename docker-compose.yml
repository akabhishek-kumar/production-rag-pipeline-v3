version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist Chroma DB and BM25 index across container restarts
      - ./chroma_db:/app/chroma_db
      - ./bm25_index.pkl:/app/bm25_index.pkl
      - ./docs:/app/docs
    restart: unless-stopped

  ingest:
    build: .
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./docs:/app/docs
    command: python ingest.py
    # Run once to build the index, then exit
    profiles: ["ingest"]
